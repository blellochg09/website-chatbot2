<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FJerry Chat</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* Chat container */
#chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 380px;
  height: 620px;
  background: #f3efe6;
  border-radius: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
#header {
  background: #4b2ca3;
  color: white;
  padding: 16px;
}

#headerTitle {
  font-size: 16px;
  font-weight: 600;
}

#headerSub {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 4px;
}

/* Messages */
#messages {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Rows */
.row {
  display: flex;
  width: 100%;
}

.user { justify-content: flex-end; }
.bot { justify-content: flex-start; }

/* Bubbles */
.bubble {
  max-width: 80%;
  padding: 12px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
}

/* User bubble */
.user .bubble {
  background: #4b2ca3;
  color: white;
  border-bottom-right-radius: 4px;
}

/* Bot bubble */
.bot .bubble {
  background: white;
  color: #222;
  border-bottom-left-radius: 4px;
}

/* Input */
#inputWrap {
  padding: 12px;
  border-top: 1px solid #ddd;
  background: #fff;
}

#form {
  display: flex;
  gap: 8px;
}

#input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
  outline: none;
}

#input:focus {
  border-color: #4b2ca3;
}

#send {
  background: #4b2ca3;
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 500;
}

#send:hover {
  opacity: 0.9;
}

/* Typing */
#typing {
  font-size: 12px;
  padding: 0 16px 10px;
  color: #666;
  display: none;
}
</style>
</head>

<body>

<div id="chat">

  <div id="header">
    <div id="headerTitle">You are talking with Jerry</div>
    <div id="headerSub">Tell me what you're trying to do — I’ll point you in the right direction.</div>
  </div>

  <div id="messages"></div>
  <div id="typing">Jerry is typing...</div>

  <div id="inputWrap">
    <form id="form">
      <input id="input" placeholder="Type your message..." autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>
  </div>

</div>

<script>
const form = document.getElementById("form");
const input = document.getElementById("input");
const messages = document.getElementById("messages");
const typing = document.getElementById("typing");

/* Add message bubble */
function addMessage(role, text) {
  const row = document.createElement("div");
  row.className = "row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  bubble.innerHTML = text.replace(/\n/g, "<br>");

  row.appendChild(bubble);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

/* 🔥 MULTI-BUBBLE EFFECT */
async function addBotResponse(text) {
  const parts = text.split("\n\n");

  for (let i = 0; i < parts.length; i++) {
    await new Promise(r => setTimeout(r, 500));
    addMessage("bot", parts[i]);
  }
}

async function sendMessage(text) {
  addMessage("user", text);
  typing.style.display = "block";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    if (!res.ok) {
      addMessage("bot", "Something went wrong.");
      return;
    }

    await addBotResponse(data.reply || "No response.");
  } catch (err) {
    addMessage("bot", "Connection error.");
  } finally {
    typing.style.display = "none";
  }
}

/* Enter to send */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  await sendMessage(text);
});

/* Initial message */
window.addEventListener("load", () => {
  addMessage("bot", "How can we help you?");
});
</script>

</body>
</html>
