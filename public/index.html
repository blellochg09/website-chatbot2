<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FJerry Strategy Assistant</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
    }

    #chat {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 380px;
      max-width: calc(100vw - 24px);
      height: 620px;
      max-height: calc(100vh - 40px);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 16px;
      background: #111;
      color: white;
    }

    #headerTitle {
      font-size: 17px;
      font-weight: 600;
    }

    #headerSub {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 4px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f6f6f7;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.user { justify-content: flex-end; }
    .row.bot { justify-content: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: #111;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot .bubble {
      background: white;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }

    #typing {
      padding: 0 16px 10px;
      font-size: 12px;
      color: #777;
      display: none;
    }

    #inputWrap {
      border-top: 1px solid #eee;
      padding: 12px;
      background: white;
    }

    #form {
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    #send {
      background: #111;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    #send:hover { opacity: 0.9; }

  </style>
</head>
<body>

<div id="chat">
  <div id="header">
    <div id="headerTitle">FJerry Strategy Assistant</div>
    <div id="headerSub">How can we help you?</div>
  </div>

  <div id="messages"></div>
  <div id="typing">Thinking...</div>

  <div id="inputWrap">
    <form id="form">
      <input id="input" placeholder="Type your message..." autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");
  const typing = document.getElementById("typing");

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = "row " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // 🔥 improves readability (splits paragraphs)
    bubble.innerHTML = text.replace(/\n/g, "<br>");

    row.appendChild(bubble);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage(text) {
    addMessage("user", text);
    typing.style.display = "block";

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      if (!res.ok) {
        addMessage("bot", "Something went wrong.");
        return;
      }

      addMessage("bot", data.reply || "No response.");
    } catch (err) {
      addMessage("bot", "Connection error.");
    } finally {
      typing.style.display = "none";
    }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    await sendMessage(text);
  });

  // Initial message
  window.addEventListener("load", () => {
    addMessage("bot", "How can we help you?");
  });
</script>

</body>
</html>
